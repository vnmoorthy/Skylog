name: 🐛 Bug report
description: Something is broken or behaving unexpectedly
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Step-by-step. Include the URL if reproducing on the live demo.
      placeholder: |
        1. Open https://vnmoorthy.github.io/Skylog/
        2. Click ...
        3. ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Chrome 132 / macOS 15.1"
  - type: textarea
    id: console
    attributes:
      label: Browser console output (if relevant)
      render: text
